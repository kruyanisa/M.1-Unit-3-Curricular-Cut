<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ม.1 Unit 3 Curricular Cut</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #fff7ed, #ffedd5); 
            font-family: 'Sarabun', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px; height: 100vh; overflow: hidden;
        }

        /* Modals */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); display: flex; 
            justify-content: center; align-items: center; z-index: 3000; 
            visibility: hidden; opacity: 0; transition: 0.3s; 
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-box { 
            background: white; padding: 25px; border-radius: 25px; 
            text-align: center; width: 90%; max-width: 360px; border: 5px solid #f97316;
        }
        .modal-box input { 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            border: 2px solid #fed7aa; border-radius: 12px; font-family: 'Sarabun'; text-align: center;
        }

        /* Container Layout */
        .app-container { 
            width: 100%; max-width: 600px; height: 100%;
            background: #ffffff; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; border: 3px solid #fb923c; overflow: hidden;
        }
        .header { 
            background: linear-gradient(90deg, #f97316, #ea580c); 
            color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold;
        }
        .user-banner { background: #fff7ed; padding: 6px; font-size: 13px; font-weight: bold; color: #9a3412; border-bottom: 1px solid #fed7aa; text-align: center; }
        .content-area { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        /* Screen States */
        .screen { display: none; width: 100%; animation: fadeIn 0.3s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Menu Buttons */
        .menu-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-top: 10px; }
        .menu-btn {
            background: #ffffff; border: 3px solid #fed7aa; padding: 20px; border-radius: 20px;
            cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .menu-btn:hover { border-color: #f97316; background: #fff7ed; transform: translateY(-2px); }
        .menu-btn i { font-size: 30px; color: #ea580c; }
        .menu-btn-text { text-align: left; font-family: 'Sarabun'; }
        .menu-btn-text h4 { margin: 0; font-size: 18px; color: #1f2937; }
        .menu-btn-text span { font-size: 13px; color: #6b7280; }

        .btn-action { 
            background: #ea580c; color: white; border: none; padding: 10px 20px; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Sarabun'; font-size: 15px;
            box-shadow: 0 4px 0 #9a3412; margin: 10px 0; transition: 0.1s;
        }
        .btn-action:active { transform: translateY(3px); box-shadow: 0 1px 0 #9a3412; }

        /* Floating Modal Dialog (Reading with Image Inside) */
        .reading-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2500; align-items: center; justify-content: center;
        }
        .reading-box {
            background: #fff; width: 92%; max-width: 480px; padding: 20px; border-radius: 25px; 
            border: 4px solid #ea580c; position: relative; text-align: center;
        }
        .popup-img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; border: 2px solid #fed7aa; }
        .close-btn { position: absolute; top: -15px; right: -15px; background: #ef4444; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid #fff; font-size: 16px; }

        /* Dropdown Exercises */
        .exercise-item { background: #fff7ed; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #f97316; text-align: left; }
        .exercise-label { font-size: 14px; font-weight: bold; color: #374151; margin-bottom: 5px; display: block; }
        select { width: 100%; padding: 8px; border-radius: 10px; border: 2px solid #fed7aa; font-family: 'Sarabun'; font-size: 14px; background: white; }

        .score-display { font-size: 45px; font-weight: 800; color: #ea580c; margin: 10px 0; display: block; }
    </style>
</head>
<body>

    <div class="modal-overlay active" id="loginModal">
        <div class="modal-box">
            <h2 style="color:#ea580c; margin-top:0;">🌍 World Wonders Explorer</h2>
            <p style="font-size:14px; color:#6b7280;">กรอกข้อมูลผู้เรียนเพื่อเริ่มต้นกิจกรรม</p>
            <input type="text" id="m_name" placeholder="ชื่อ-นามสกุล">
            <input type="text" id="m_room" placeholder="ชั้น/ห้อง (เช่น 1/1)">
            <input type="text" id="m_id" placeholder="รหัสนักเรียน 5 หลัก" maxlength="5" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            <button class="btn-action" onclick="startLesson()" style="width:100%; margin-top:10px;">เข้าสู่บทเรียน 🚀</button>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display:none;">
        <div class="header">ม.1 Unit 3: Curricular Cut</div>
        <div class="user-banner" id="userBanner">Loading...</div>
        
        <div class="content-area">
            
            <div class="screen active" id="menuScreen">
                <h3 style="color:#ea580c; margin: 5px 0;">🎯 เลือกชุดบทเรียนเพื่อสำรวจ</h3>
                <div class="menu-grid">
                    <button class="menu-btn" onclick="showScreen('tajScreen')">
                        <i class="fa-solidxl fa-gopuram"><span style="font-size:30px;">🕌</span></i>
                        <div class="menu-btn-text">
                            <h4>Part 1: Taj Mahal</h4>
                            <span id="statusTaj">สถานะ: ⏳ ยังไม่ได้ทำ (5 ข้อ)</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="showScreen('wallScreen')">
                        <i class="fa-solidxl fa-archway"><span style="font-size:30px;">🏮</span></i>
                        <div class="menu-btn-text">
                            <h4>Part 2: Great Wall of China</h4>
                            <span id="statusWall">สถานะ: ⏳ ยังไม่ได้ทำ (3 ข้อ)</span>
                        </div>
                    </button>
                </div>
                <div style="margin-top: 30px; width:100%;">
                    <button class="btn-action" id="finalSubmitBtn" style="background:#10b981; box-shadow: 0 4px 0 #059669; width:100%; height:50px; font-size:18px;" onclick="submitFinalScore()">✅ บันทึกและส่งคะแนนเข้าระบบ</button>
                </div>
            </div>

            <div class="screen" id="tajScreen">
                <button class="btn-action" style="background:#6b7280; box-shadow:0 4px 0 #4b5563;" onclick="showScreen('menuScreen')"><i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก</button>
                <h3 style="color:#ea580c; margin:10px 0;">🕌 Part 1: Taj Mahal, India</h3>
                <button class="btn-action" style="background:#f59e0b; box-shadow:0 4px 0 #b45309;" onclick="openReadingPopup('taj')">📖 กดดูรูปภาพและฟังบรรยาย</button>
                
                <div id="tajForm" style="margin-top:10px;">
                    <div class="exercise-item"><label class="exercise-label">1. The Taj Mahal is in...</label><select id="taj1" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="Agra, India">Agra, India</option><option value="Bangkok, Thailand">Bangkok, Thailand</option></select></div>
                    <div class="exercise-item"><label class="exercise-label">2. It is made of white marble and...</label><select id="taj2" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="precious stones">precious stones</option><option value="old bricks">old bricks</option></select></div>
                    <div class="exercise-item"><label class="exercise-label">3. There are __ rooms inside.</label><select id="taj3" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="8">8</option><option value="16">16</option></select></div>
                    <div class="exercise-item"><label class="exercise-label">4. There are four...</label><select id="taj4" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="minarets">minarets</option><option value="domes">domes</option></select></div>
                    <div class="exercise-item"><label class="exercise-label">5. The garden has got four...</label><select id="taj5" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="pools">pools</option><option value="rivers">rivers</option></select></div>
                </div>
            </div>

            <div class="screen" id="wallScreen">
                <button class="btn-action" style="background:#6b7280; box-shadow:0 4px 0 #4b5563;" onclick="showScreen('menuScreen')"><i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก</button>
                <h3 style="color:#ea580c; margin:10px 0;">🏮 Part 2: Great Wall of China</h3>
                <button class="btn-action" style="background:#f59e0b; box-shadow:0 4px 0 #b45309;" onclick="openReadingPopup('wall')">📖 กดดูรูปภาพและฟังบรรยาย</button>
                
                <div id="wallForm" style="margin-top:10px;">
                    <div class="exercise-item"><label class="exercise-label">1. Which continent is it in?</label><select id="wall1" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="Asia">Asia</option><option value="Europe">Europe</option></select></div>
                    <div class="exercise-item"><label class="exercise-label">2. What is it made of?</label><select id="wall2" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="Only stones">Only stones</option><option value="Earth, stones, bricks and wood">Earth, stones, bricks and wood</option></select></div>
                    <div class="exercise-item"><label class="exercise-label">3. What does it look like?</label><select id="wall3" onchange="saveProgress()"><option value="">-- เลือกคำตอบ --</option><option value="Short wall">Short wall</option><option value="Over 5000 km long with watch towers">Over 5000 km long with watch towers</option></select></div>
                </div>
            </div>

        </div>
    </div>

    <div class="reading-modal" id="readingPanel">
        <div class="reading-box">
            <div class="close-btn" onclick="closeReadingPopup()"><i class="fa-solid fa-xmark"></i></div>
            <img src="" id="popupImage" class="popup-img" alt="Wonder Image">
            <h3 id="readTitle" style="color:#ea580c; margin:5px 0;">Reading Panel</h3>
            <audio id="audioPlayer" controls style="width:100%; margin-bottom:10px;"></audio>
            <div id="readText" style="font-size:13px; line-height:1.5; color:#374151; text-align:left; max-height:140px; overflow-y:auto; background:#f8fafc; padding:10px; border-radius:10px;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="scoreModal">
        <div class="modal-box">
            <h2>🎉 Excellent Explorer!</h2>
            <p>บันทึกการสำรวจโลกเสร็จสมบูรณ์</p>
            <span class="score-display" id="finalScoreText">0 / 8</span>
            <div id="saveStatus" style="font-weight:bold; color:#ea580c;">⏳ กำลังบันทึกคะแนน...</div>
        </div>
    </div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxd_UGE1ZY_1dcB3B7l0Vy8azxhuuFoc_kftJ7QZ1Nc4XIaXGKF9RPs8WxhZ0K5VyVN/exec';
    let student = { name: "", room: "", id: "" };
    let audio = document.getElementById('audioPlayer');

    window.onload = () => {
        document.getElementById('m_room').addEventListener('blur', function() { this.value = formatRoomInput(this.value); });
    };

    function formatRoomInput(val) {
        let nums = val.trim().match(/\d+/g);
        if (nums && nums.length >= 2) return `ม.${nums[0]}/${nums[1]}`;
        if (nums && nums.length === 1) return `ม.${nums[0]}`;
        return val.trim();
    }

    function startLesson() {
        const n = document.getElementById('m_name').value.trim();
        const r = formatRoomInput(document.getElementById('m_room').value);
        const i = document.getElementById('m_id').value.trim();
        if(!n || !r || i.length !== 5) { alert('กรุณากรอกข้อมูลส่วนตัวให้ถูกต้องครบถ้วนครับ'); return; }
        student = { name: n, room: r, id: i };
        document.getElementById('userBanner').innerText = `👤 Explorer: ${n} | Room: ${r} | ID: ${i}`;
        document.getElementById('loginModal').classList.remove('active');
        document.getElementById('mainApp').style.display = 'flex';
        saveProgress();
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    const contentData = {
        taj: { title: "Taj Mahal, India", image: "taj_mahal.jpg", audio: "audio1.mp3", text: "The Taj Mahal is in Agra, India. It is one of the top seven tourist travel wonders of the world. The palace is made of white marble and precious stones. Shines with different colours like pink at sunrise, yellow at sunset and blue at night. There is a huge dome and four minarets. Inside, there are 16 rooms. Outside, there is a beautiful garden with four pools." },
        wall: { title: "The Great Wall of China", image: "great_wall.jpg", audio: "audio2.mp3", text: "The Great Wall of China is in Asia. It is one of the top seven tourist travel wonders of the world. The wall is made of earth, stones, bricks and wood. It is over 5000 kilometres long. The wall has also got watch towers for storing weapons and for sending smoke signals. It is one of the most popular tourist attractions in the world." }
    };

    function openReadingPopup(key) {
        document.getElementById('popupImage').src = contentData[key].image;
        document.getElementById('readTitle').innerText = contentData[key].title;
        document.getElementById('readText').innerText = contentData[key].text;
        audio.src = contentData[key].audio;
        document.getElementById('readingPanel').style.display = 'flex';
        audio.play();
    }

    function closeReadingPopup() {
        document.getElementById('readingPanel').style.display = 'none';
        audio.pause();
    }

    function saveProgress() {
        let tajDone = ['taj1','taj2','taj3','taj4','taj5'].every(id => document.getElementById(id).value !== "");
        let wallDone = ['wall1','wall2','wall3'].every(id => document.getElementById(id).value !== "");
        
        document.getElementById('statusTaj').innerHTML = tajDone ? "สถานะ:  ทำครบแล้ว (5 ข้อ)" : "สถานะ: ⏳ ยังทำไม่ครบ (5 ข้อ)";
        document.getElementById('statusTaj').style.color = tajDone ? "#10b981" : "#6b7280";
        document.getElementById('statusWall').innerHTML = wallDone ? "สถานะ:  ทำครบแล้ว (3 ข้อ)" : "สถานะ: ⏳ ยังทำไม่ครบ (3 ข้อ)";
        document.getElementById('statusWall').style.color = wallDone ? "#10b981" : "#6b7280";
    }

    async function submitFinalScore() {
        let score = 0;
        if(document.getElementById('taj1').value === "Agra, India") score++;
        if(document.getElementById('taj2').value === "precious stones") score++;
        if(document.getElementById('taj3').value === "16") score++;
        if(document.getElementById('taj4').value === "minarets") score++;
        if(document.getElementById('taj5').value === "pools") score++;
        if(document.getElementById('wall1').value === "Asia") score++;
        if(document.getElementById('wall2').value === "Earth, stones, bricks and wood") score++;
        if(document.getElementById('wall3').value === "Over 5000 km long with watch towers") score++;

        document.getElementById('finalScoreText').innerText = `${score} / 8`;
        document.getElementById('scoreModal').classList.add('active');

        const payload = {
            name: student.name,
            room: student.room,
            studentId: "'" + student.id,
            lesson: "ม.1 Unit 3: Curricular Cut (7 Wonders)",
            score: score,
            maxScore: 8,
            _t: new Date().getTime()
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            document.getElementById('saveStatus').innerText = "✅ บันทึกคะแนนสำเร็จ!";
            document.getElementById('saveStatus').style.color = "#10b981";
        } catch(e) {
            document.getElementById('saveStatus').innerText = "❌ เกิดข้อผิดพลาดในการส่งข้อมูล";
            document.getElementById('saveStatus').style.color = "#ef4444";
        }
    }
</script>
</body>
</html>

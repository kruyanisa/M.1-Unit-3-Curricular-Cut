<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ม.1 Unit 3 Curricular Cut</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. THE SETUP (No Scrollbar) */
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #fff7ed, #ffedd5); 
            font-family: 'Sarabun', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px; height: 100vh; overflow: hidden;
        }

        /* 2. MODALS (Login, Transcript, Score) */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); display: flex; 
            justify-content: center; align-items: center; z-index: 3000; 
            visibility: hidden; opacity: 0; transition: 0.3s; 
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-box { 
            background: white; padding: 25px; border-radius: 25px; 
            text-align: center; width: 90%; max-width: 380px; border: 5px solid #f97316;
        }
        .modal-box input { 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            border: 2px solid #fed7aa; border-radius: 12px; font-family: 'Sarabun'; text-align: center;
        }

        /* 3. APP CONTAINER */
        .app-container { 
            width: 100%; max-width: 600px; height: 100%;
            background: #ffffff; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; border: 3px solid #fb923c; overflow: hidden;
        }
        .header { 
            background: linear-gradient(90deg, #f97316, #ea580c); 
            color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold;
        }
        .user-info { background: #fff7ed; padding: 5px; font-size: 12px; font-weight: bold; color: #9a3412; border-bottom: 1px solid #fed7aa; text-align: center; }

        .content-area { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        /* 4. CONTENT SCREENS */
        .screen { display: none; width: 100%; animation: fadeIn 0.3s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .img-wonder { width: 100%; height: 160px; object-fit: cover; border-radius: 20px; border: 3px solid #fed7aa; margin-bottom: 10px; }
        
        audio { width: 100%; margin-bottom: 10px; height: 35px; }

        .btn-action { 
            background: #ea580c; color: white; border: none; padding: 10px 20px; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Sarabun';
            box-shadow: 0 4px 0 #9a3412; transition: 0.1s;
        }
        .btn-action:active { transform: translateY(3px); box-shadow: 0 1px 0 #9a3412; }

        /* 5. EXERCISES (Dropdowns) */
        .exercise-item { background: #fff7ed; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; border-left: 5px solid #f97316; text-align: left; }
        .exercise-label { font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 4px; display: block; }
        select { width: 100%; padding: 6px; border-radius: 8px; border: 2px solid #fed7aa; font-family: 'Sarabun'; font-size: 14px; }

        /* 6. NAVIGATION FOOTER */
        .nav-footer { padding: 15px; background: #f8fafc; border-top: 1px solid #fed7aa; display: flex; justify-content: space-between; gap: 10px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-weight: bold; font-family: 'Sarabun'; cursor: pointer; box-shadow: 0 4px 0 #cbd5e1; }
        .nav-btn.next { background: #0ea5e9; color: white; box-shadow: 0 4px 0 #0369a1; }
        .nav-btn.prev { background: #94a3b8; color: white; box-shadow: 0 4px 0 #475569; }
        .nav-btn.submit { background: #10b981; color: white; box-shadow: 0 4px 0 #059669; }

        .score-num { font-size: 50px; font-weight: 800; color: #ea580c; margin: 10px 0; display: block; }
    </style>
</head>
<body>

    <div class="modal-overlay active" id="loginModal">
        <div class="modal-box">
            <h2 style="margin-top:0;">🌍 Explorer Login</h2>
            <input type="text" id="m_name" placeholder="ชื่อ-นามสกุล">
            <input type="text" id="m_room" placeholder="ชั้น/ห้อง (เช่น 1/1)">
            <input type="text" id="m_id" placeholder="รหัสประจำตัว 5 หลัก" maxlength="5">
            <button class="btn-action" onclick="login()" style="width:100%; margin-top:10px;">เริ่มการสำรวจ 🚀</button>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display:none;">
        <div class="header">ม.1 Unit 3: Curricular Cut</div>
        <div class="user-info" id="userInfo">Explorer: -</div>
        
        <div class="content-area">
            <div class="screen active" id="step1">
                <img src="taj_mahal.jpg" class="img-wonder">
                <audio id="audioTaj" controls><source src="audio1.mp3"></audio>
                <button class="btn-action" style="width:100%; background:#f59e0b; margin-bottom:15px;" onclick="openTranscript('taj')">📖 เปิดดูบทอ่าน (Transcript)</button>
                
                <div class="exercise-item"><label class="exercise-label">1. The Taj Mahal is in...</label><select id="t1"><option value="">-- เลือกคำตอบ --</option><option value="Agra, India">Agra, India</option><option value="Bangkok, Thailand">Bangkok, Thailand</option></select></div>
                <div class="exercise-item"><label class="exercise-label">2. Made of white marble and...</label><select id="t2"><option value="">-- เลือกคำตอบ --</option><option value="precious stones">precious stones</option><option value="old bricks">old bricks</option></select></div>
                <div class="exercise-item"><label class="exercise-label">3. There are __ rooms inside.</label><select id="t3"><option value="">-- เลือกคำตอบ --</option><option value="8">8</option><option value="16">16</option></select></div>
                <div class="exercise-item"><label class="exercise-label">4. There are four...</label><select id="t4"><option value="">-- เลือกคำตอบ --</option><option value="minarets">minarets</option><option value="domes">domes</option></select></div>
                <div class="exercise-item"><label class="exercise-label">5. The garden has got four...</label><select id="t5"><option value="">-- เลือกคำตอบ --</option><option value="pools">pools</option><option value="rivers">rivers</option></select></div>
            </div>

            <div class="screen" id="step2">
                <img src="great_wall.jpg" class="img-wonder">
                <audio id="audioWall" controls><source src="audio2.mp3"></audio>
                <button class="btn-action" style="width:100%; background:#f59e0b; margin-bottom:15px;" onclick="openTranscript('wall')">📖 เปิดดูบทอ่าน (Transcript)</button>
                
                <div class="exercise-item"><label class="exercise-label">1. Which continent is it in?</label><select id="w1"><option value="">-- เลือกคำตอบ --</option><option value="Asia">Asia</option><option value="Europe">Europe</option></select></div>
                <div class="exercise-item"><label class="exercise-label">2. What is it made of?</label><select id="w2"><option value="">-- เลือกคำตอบ --</option><option value="Stones only">Stones only</option><option value="Earth, stones, bricks and wood">Earth, stones, bricks and wood</option></select></div>
                <div class="exercise-item"><label class="exercise-label">3. What does it look like?</label><select id="w3"><option value="">-- เลือกคำตอบ --</option><option value="Short wall">Short wall</option><option value="Over 5000 km long with watch towers">Over 5000 km long with watch towers</option></select></div>
            </div>
        </div>

        <div class="nav-footer">
            <button id="prevBtn" class="nav-btn prev" style="visibility:hidden;" onclick="changeStep(-1)">⬅️ ก่อนหน้า</button>
            <button id="nextBtn" class="nav-btn next" onclick="changeStep(1)">ถัดไป ➡️</button>
            <button id="submitBtn" class="nav-btn submit" style="display:none;" onclick="submitScore()">✅ ส่งคะแนน</button>
        </div>
    </div>

    <div class="modal-overlay" id="transcriptModal" onclick="closeTranscript()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="transTitle" style="color:#ea580c; margin-top:0;">Transcript</h3>
            <div id="transText" style="text-align:left; font-size:14px; line-height:1.6; max-height:250px; overflow-y:auto; background:#f8fafc; padding:15px; border-radius:15px;"></div>
            <button class="btn-action" style="width:100%; margin-top:15px; background:#ef4444;" onclick="closeTranscript()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div class="modal-overlay" id="scoreModal">
        <div class="modal-box">
            <h2>สำรวจสำเร็จ! 🏆</h2>
            <span class="score-num" id="scoreValue">0 / 8</span>
            <div id="saveStatus" style="font-weight:bold; color:#ea580c; margin-bottom:15px;">⏳ กำลังบันทึก...</div>
            <button class="btn-action" id="restartBtn" style="display:none; width:100%; background:#10b981;" onclick="location.reload()">🔄 เริ่มใหม่อีกครั้ง</button>
        </div>
    </div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxd_UGE1ZY_1dcB3B7l0Vy8azxhuuFoc_kftJ7QZ1Nc4XIaXGKF9RPs8WxhZ0K5VyVN/exec';
    let student = { name: "", room: "", id: "" };
    let currentStep = 1;

    window.onload = () => {
        // ระบบจำ Account
        if(localStorage.getItem('sv_name')) {
            document.getElementById('m_name').value = localStorage.getItem('sv_name');
            document.getElementById('m_room').value = localStorage.getItem('sv_room');
            document.getElementById('m_id').value = localStorage.getItem('sv_id');
        }

        document.getElementById('m_room').addEventListener('blur', function() { 
            let nums = this.value.trim().match(/\d+/g);
            if (nums && nums.length >= 2) this.value = `ม.${nums[0]}/${nums[1]}`;
            else if (nums && nums.length === 1) this.value = `ม.${nums[0]}`;
        });
    };

    function login() {
        const n = document.getElementById('m_name').value.trim();
        const r = document.getElementById('m_room').value.trim();
        const i = document.getElementById('m_id').value.trim();
        if(!n || !r || i.length !== 5) { alert('กรุณากรอกข้อมูลให้ครบถ้วนครับ'); return; }
        
        // บันทึก Account ลงเครื่อง
        localStorage.setItem('sv_name', n);
        localStorage.setItem('sv_room', r);
        localStorage.setItem('sv_id', i);

        student = { name: n, room: r, id: i };
        document.getElementById('userInfo').innerText = `Explorer: ${n} | Room: ${r} | ID: ${i}`;
        document.getElementById('loginModal').classList.remove('active');
        document.getElementById('mainApp').style.display = 'flex';
    }

    function changeStep(dir) {
        document.getElementById('audioTaj').pause();
        document.getElementById('audioWall').pause();
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.remove('active');
        
        currentStep += dir;
        document.getElementById('step' + currentStep).classList.add('active');

        document.getElementById('prevBtn').style.visibility = (currentStep === 1) ? 'hidden' : 'visible';
        document.getElementById('nextBtn').style.display = (currentStep === 2) ? 'none' : 'block';
        document.getElementById('submitBtn').style.display = (currentStep === 2) ? 'block' : 'none';
    }

    const transcripts = {
        taj: { title: "🕌 Taj Mahal Transcript", text: "The Taj Mahal is in Agra, India. It is one of the top seven tourist travel wonders of the world. The palace is made of white marble and precious stones. The marble shines with different colours like pink at sunrise, yellow at sunset and blue at night when there is a full moon. There is a huge dome in the centre that looks like a large pearl and there are four minarets, one at each corner. Inside, there are two floors each with eight rooms. Outside, there is a beautiful garden with four pools. The Taj Mahal is a fantastic building." },
        wall: { title: "🏮 Great Wall Transcript", text: "The Great Wall of China is in Asia. It is one of the top seven tourist travel wonders of the world. The wall is made of earth, stones, bricks and wood. It is over 5000 kilometres long. The wall has also got watch towers for storing weapons and for sending smoke signals. The Great Wall of China is one of the most popular tourist attractions in the world." }
    };

    function openTranscript(key) {
        document.getElementById('transTitle').innerText = transcripts[key].title;
        document.getElementById('transText').innerText = transcripts[key].text;
        document.getElementById('transcriptModal').classList.add('active');
    }

    function closeTranscript() { document.getElementById('transcriptModal').classList.remove('active'); }

    async function submitScore() {
        let score = 0;
        if(document.getElementById('t1').value === "Agra, India") score++;
        if(document.getElementById('t2').value === "precious stones") score++;
        if(document.getElementById('t3').value === "16") score++;
        if(document.getElementById('t4').value === "minarets") score++;
        if(document.getElementById('t5').value === "pools") score++;
        if(document.getElementById('w1').value === "Asia") score++;
        if(document.getElementById('w2').value === "Earth, stones, bricks and wood") score++;
        if(document.getElementById('w3').value === "Over 5000 km long with watch towers") score++;

        document.getElementById('scoreValue').innerText = `${score} / 8`;
        document.getElementById('scoreModal').classList.add('active');

        const payload = {
            name: student.name, room: student.room, studentId: "'" + student.id,
            lesson: "ม.1 Unit 3 Curricular Cut", score: score, maxScore: 8, _t: new Date().getTime()
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            document.getElementById('saveStatus').innerText = "✅ บันทึกคะแนนสำเร็จ!";
            document.getElementById('saveStatus').style.color = "#10b981";
        } catch(e) {
            document.getElementById('saveStatus').innerText = "❌ บันทึกไม่สำเร็จ";
            document.getElementById('saveStatus').style.color = "#ef4444";
        }
        document.getElementById('restartBtn').style.display = "block";
    }
</script>
</body>
</html>
